<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INTEL-OPS // PRO_V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg:#020608;--panel:#070d12;--panel2:#0b1520;
            --accent:#00f2ff;--red:#ff2d2d;--orange:#ff8c00;
            --green:#00ff88;--yellow:#ffe600;
            --text:#c8d8e8;--muted:#3d5166;--border:#112030;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;height:100vh;overflow:hidden}
        body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
        background-image:linear-gradient(rgba(0,242,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,0.03) 1px,transparent 1px);
        background-size:40px 40px}
        .scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
        .header{height:48px;background:var(--panel);border-bottom:1px solid var(--accent);display:flex;align-items:center;padding:0 16px;justify-content:space-between;position:relative;z-index:100;box-shadow:0 0 20px rgba(0,242,255,0.1)}
        .logo{font-family:'JetBrains Mono';color:var(--accent);font-weight:700;font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:10px}
        .dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 1.5s ease-in-out infinite;box-shadow:0 0 8px var(--green)}
        .dash{display:grid;grid-template-columns:320px 1fr 420px;height:calc(100vh - 48px);position:relative;z-index:1}
        .col{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
        .col-hdr{padding:9px 14px;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border);font-family:'JetBrains Mono';font-size:11px;color:var(--accent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .scroll{overflow-y:auto;flex:1;padding:12px}
        .scroll::-webkit-scrollbar{width:3px}
        .scroll::-webkit-scrollbar-thumb{background:var(--border)}
        #map{height:280px;width:100%;flex-shrink:0;border-bottom:2px solid var(--accent);position:relative;filter:saturate(0.85) contrast(1.1) brightness(0.9)}
        .map-wrap{position:relative;flex-shrink:0}
        .map-lbl{position:absolute;top:8px;right:8px;z-index:1000;font-family:'JetBrains Mono';font-size:10px;color:var(--accent);background:rgba(2,6,8,0.9);padding:4px 8px;border:1px solid var(--accent);pointer-events:none}
        .map-search{position:absolute;bottom:8px;left:8px;right:8px;z-index:1000;display:flex;gap:4px}
        .map-search input{flex:1;background:rgba(2,6,8,0.92);border:1px solid var(--muted);color:var(--text);padding:5px 9px;font-family:Cairo,sans-serif;font-size:11px;border-radius:2px;outline:none}
        .map-search button{background:rgba(255,45,45,0.15);border:1px solid var(--red);color:var(--red);padding:4px 8px;font-size:10px;cursor:pointer;border-radius:2px}
        .stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
        .stat-lbl{color:var(--muted);font-size:11px}
        .news-item{background:var(--panel2);padding:11px 13px;margin-bottom:7px;border-radius:3px;cursor:pointer;border-right:3px solid transparent;transition:all .2s}
        .news-item.active{background:#0e1e2e;border-right-color:var(--accent);box-shadow:0 0 15px rgba(0,242,255,0.07)}
        .news-title{font-size:13px;font-weight:600;line-height:1.5}
        .card{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:16px;animation:fadeIn .3s ease}
        .tbadge{padding:4px 14px;border-radius:2px;font-weight:700;font-size:12px;font-family:'JetBrains Mono'}
        .tc{background:var(--red);color:#fff} .th{background:var(--orange);color:#000} .tm{background:var(--yellow);color:#000}
        .score-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px}
        .score-fill{height:100%;transition:width .8s ease}
        .sec-lbl{font-family:'JetBrains Mono';font-size:10px;color:var(--accent);margin-bottom:6px;opacity:.8}
        .sec-txt{font-size:12px;line-height:1.7;color:#a0b4c8;margin-bottom:12px}
        .tgt{display:flex;align-items:center;gap:8px;padding:5px 8px;margin-bottom:3px;background:var(--panel2);border-radius:3px;font-size:11px}
        .tgt-dot{width:6px;height:6px;border-radius:50%}
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--accent)}
        .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes blink{50%{opacity:.4}}
        @keyframes mapPulse{0%{transform:scale(.5);opacity:.7}100%{transform:scale(3);opacity:0}}
    </style>
</head>
<body>
<div class="scan"></div>
<header class="header">
    <div class="logo"><div class="dot"></div>INTEL-OPS // PRO_V3</div>
    <div class="hdr-r">
        <span id="news-count" style="color:var(--muted);font-size:11px">0 خبر</span>
        <span class="pill" style="background:rgba(0,255,136,0.12);color:var(--green)">● ONLINE</span>
        <span id="clock" style="color:var(--accent);font-family:'JetBrains Mono'">00:00:00 Z</span>
    </div>
</header>

<div class="dash">
    <div class="col">
        <div class="map-wrap">
            <div id="map"></div>
            <div class="map-lbl">GEO // TACTICAL VIEW</div>
            <div class="map-search">
                <input id="geo-input" type="text" placeholder="🔍 ابحث عن موقع...">
                <button onclick="clearMap()">CLR</button>
            </div>
        </div>
        <div class="col-hdr">📊 GEOSPATIAL STATS <span id="tgt-count" style="background:var(--accent);color:#000;padding:1px 5px;border-radius:2px">0</span></div>
        <div class="scroll">
            <div class="stat-row"><span class="stat-lbl">آخر موقع</span><span id="s-loc" class="stat-val">--</span></div>
            <div class="stat-row"><span class="stat-lbl">مستوى التهديد</span><span id="s-threat" class="stat-val">--</span></div>
            <div id="tgt-list" style="margin-top:10px"></div>
        </div>
    </div>
    <div class="col">
        <div class="col-hdr">📡 LIVE OSINT FEED <button onclick="loadNews()" style="background:none;border:none;color:var(--accent);cursor:pointer">↺</button></div>
        <div id="news-list" class="scroll"></div>
    </div>
    <div class="col">
        <div class="col-hdr">🧠 ANALYSIS UNIT <span id="a-status" style="color:var(--muted)">STANDBY</span></div>
        <div id="a-view" class="scroll">
            <div style="text-align:center;padding-top:100px;opacity:.3">🎯 اختر خبراً لتحريك الخريطة والتحليل</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, markers = [], targetHistory = [];

// === تهيئة التطبيق ===
function init() {
    // 1. ساعة النظام
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toUTCString().slice(17,25) + ' Z';
    }, 1000);

    // 2. تهيئة الخريطة (قمر صناعي عسكري)
    map = L.map('map', { zoomControl:false, attributionControl:false }).setView([30, 45], 4);
    
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.6 }).addTo(map);

    loadNews();
}

// === جلب الأخبار ===
async function loadNews() {
    const list = document.getElementById('news-list');
    list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
        const res = await fetch('/api/proxy?type=news');
        const data = await res.json();
        window._news = data.articles;
        document.getElementById('news-count').innerText = data.articles.length + ' خبر';
        list.innerHTML = data.articles.map((a, i) => `
            <div class="news-item" id="n${i}" onclick="analyze(${i})">
                <div class="news-title">${a.title}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:5px">${a.source?.name || 'RSS'} | ${new Date().toLocaleTimeString()}</div>
            </div>
        `).join('');
    } catch(e) { list.innerHTML = '<div class="err">فشل تحميل الأخبار</div>'; }
}

// === التحليل وتحريك الخريطة (الإصلاح الجوهري هنا) ===
async function analyze(idx) {
    const news = window._news[idx];
    const view = document.getElementById('a-view');
    const st = document.getElementById('a-status');
    
    document.querySelectorAll('.news-item').forEach(el => el.classList.remove('active'));
    document.getElementById('n'+idx).classList.add('active');

    st.innerText = 'TARGETING...';
    view.innerHTML = '<div class="loading"><div class="spinner"></div><span>تحديد إحداثيات الموقع...</span></div>';

    try {
        const res = await fetch('/api/proxy?type=analyze&text=' + encodeURIComponent(news.title));
        const d = await res.json();
        
        // تحويل النصوص إلى أرقام بدقة
        const lat = parseFloat(d.lat);
        const lng = parseFloat(d.lng);

        if (!isNaN(lat) && !isNaN(lng) && lat !== 0) {
            // تحريك الخريطة للموقع الجديد فوراً
            map.flyTo([lat, lng], 8, { animate: true, duration: 1.5 });
            
            // إضافة العلامة التكتيكية
            addTacticalMarker(lat, lng, d.threat_level, d.location_name);
            
            // تحديث الإحصائيات في العمود الأول
            document.getElementById('s-loc').innerText = d.location_name;
            document.getElementById('s-threat').innerHTML = `<span style="color:${getColor(d.threat_level)}">${d.threat_level}</span>`;
            
            updateTargetHistory(d.location_name, d.threat_level);
        }

        renderAnalysisUI(d);
        st.innerText = 'LOCKED';
    } catch(e) { view.innerHTML = '<div class="err">فشل تحليل الموقع</div>'; }
}

function addTacticalMarker(lat, lng, level, name) {
    const color = getColor(level);
    const icon = L.divIcon({
        className: '',
        html: `<div style="position:relative;width:30px;height:30px">
                <div style="position:absolute;inset:0;border:1px solid ${color};border-radius:50%;animation:mapPulse 2s infinite"></div>
                <div style="position:absolute;inset:10px;background:${color};border-radius:50%;box-shadow:0 0 10px ${color}"></div>
               </div>`,
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });

    const m = L.marker([lat, lng], {icon}).addTo(map).bindPopup(`<b>${name}</b>`).openPopup();
    markers.push(m);
    document.getElementById('tgt-count').innerText = markers.length;
}

function renderAnalysisUI(d) {
    const color = getColor(d.threat_level);
    const cls = d.threat_level.includes('حرج') ? 'tc' : (d.threat_level.includes('مرتفع') ? 'th' : 'tm');
    
    document.getElementById('a-view').innerHTML = `
        <div class="card">
            <div style="display:flex;justify-content:space-between;margin-bottom:15px">
                <span class="tbadge ${cls}">${d.threat_level}</span>
                <span style="font-family:monospace;font-size:11px">${d.location_name}</span>
            </div>
            <div class="score-bar"><div class="score-fill" style="width:${d.threat_score}%;background:${color}"></div></div>
            <div style="margin-top:15px">
                <div class="sec-lbl">// ملخص استخباراتي</div>
                <p class="sec-txt">${d.summary}</p>
                <div class="sec-lbl">// السيناريو القادم</div>
                <div style="background:rgba(255,45,45,0.1);padding:10px;border-right:3px solid ${color};font-size:12px">
                    ${d.scenarios.worst}
                </div>
            </div>
        </div>
    `;
}

function updateTargetHistory(name, threat) {
    targetHistory.unshift({name, threat, color: getColor(threat)});
    if(targetHistory.length > 5) targetHistory.pop();
    document.getElementById('tgt-list').innerHTML = targetHistory.map(t => `
        <div class="tgt">
            <div class="tgt-dot" style="background:${t.color}"></div>
            <span style="flex:1">${t.name}</span>
            <span style="color:${t.color};font-size:10px">${t.threat}</span>
        </div>
    `).join('');
}

function getColor(l) {
    if(l.includes('حرج')) return 'var(--red)';
    if(l.includes('مرتفع')) return 'var(--orange)';
    return 'var(--yellow)';
}

function clearMap() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    document.getElementById('tgt-count').innerText = '0';
    document.getElementById('tgt-list').innerHTML = '';
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
