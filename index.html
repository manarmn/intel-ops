<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INTEL-OPS // PRO_V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg:#020608;--panel:#070d12;--panel2:#0b1520;
            --accent:#00f2ff;--red:#ff2d2d;--orange:#ff8c00;
            --green:#00ff88;--yellow:#ffe600;
            --text:#c8d8e8;--muted:#3d5166;--border:#112030;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;height:100vh;overflow:hidden}
        body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
        background-image:linear-gradient(rgba(0,242,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,0.03) 1px,transparent 1px);
        background-size:40px 40px}
        .scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
        .header{height:48px;background:var(--panel);border-bottom:1px solid var(--accent);display:flex;align-items:center;padding:0 16px;justify-content:space-between;position:relative;z-index:100;box-shadow:0 0 20px rgba(0,242,255,0.1)}
        .logo{font-family:'JetBrains Mono';color:var(--accent);font-weight:700;font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:10px}
        .dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 1.5s ease-in-out infinite;box-shadow:0 0 8px var(--green)}
        .hdr-r{display:flex;align-items:center;gap:16px;font-family:'JetBrains Mono';font-size:12px}
        .pill{padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700}
        .dash{display:grid;grid-template-columns:320px 1fr 420px;height:calc(100vh - 48px);position:relative;z-index:1}
        .col{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
        .col-hdr{padding:9px 14px;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border);font-family:'JetBrains Mono';font-size:11px;color:var(--accent);letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .bdg{background:var(--accent);color:#000;padding:1px 7px;border-radius:2px;font-size:10px;font-weight:700}
        .scroll{overflow-y:auto;flex:1;padding:12px}
        .scroll::-webkit-scrollbar{width:3px}
        .scroll::-webkit-scrollbar-thumb{background:var(--border)}
        #map{height:280px;width:100%;flex-shrink:0;border-bottom:2px solid var(--accent);position:relative;filter:saturate(0.85) contrast(1.15) brightness(0.9)}
        .map-wrap{position:relative;flex-shrink:0}
        .map-lbl{position:absolute;top:8px;right:8px;z-index:1000;font-family:'JetBrains Mono';font-size:10px;color:var(--accent);background:rgba(2,6,8,0.9);padding:4px 8px;border:1px solid var(--accent);pointer-events:none}
        .map-search{position:absolute;bottom:8px;left:8px;right:8px;z-index:1000;display:flex;gap:4px}
        .map-search input{flex:1;background:rgba(2,6,8,0.92);border:1px solid var(--muted);color:var(--text);padding:5px 9px;font-family:Cairo,sans-serif;font-size:11px;border-radius:2px;outline:none}
        .map-search button{background:rgba(255,45,45,0.15);border:1px solid var(--red);color:var(--red);padding:4px 8px;font-size:10px;cursor:pointer;border-radius:2px}
        .news-item{background:var(--panel2);padding:11px 13px;margin-bottom:7px;border-radius:3px;cursor:pointer;border-right:3px solid transparent;transition:all .2s}
        .news-item:hover{background:#0f1d2a;border-right-color:var(--muted)}
        .news-item.active{background:#0e1e2e;border-right-color:var(--accent);box-shadow:0 0 15px rgba(0,242,255,0.07)}
        .news-title{font-size:13px;font-weight:600;line-height:1.5;margin-bottom:5px}
        .news-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
        .card{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:16px;animation:fadeIn .3s ease}
        .threat-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
        .tbadge{padding:4px 14px;border-radius:2px;font-weight:700;font-size:12px;font-family:'JetBrains Mono'}
        .tc{background:var(--red);color:#fff} .th{background:var(--orange);color:#000} .tm{background:var(--yellow);color:#000} .tl{background:var(--green);color:#000}
        .score-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px}
        .score-fill{height:100%;transition:width .8s ease}
        .sec-lbl{font-family:'JetBrains Mono';font-size:10px;color:var(--accent);margin-bottom:6px;opacity:.8}
        .sec-txt{font-size:12px;line-height:1.7;color:#a0b4c8;margin-bottom:12px}
        .sc-item{padding:8px 12px;border-radius:3px;font-size:12px;margin-bottom:6px;border-right:3px solid}
        .sc-cur{background:rgba(0,132,255,0.08);border-color:#0084ff}
        .sc-best{background:rgba(0,255,136,0.07);border-color:var(--green)}
        .sc-worst{background:rgba(255,45,45,0.07);border-color:var(--red)}
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--accent)}
        .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
        .ticker-wrap{overflow:hidden;background:rgba(0,242,255,0.04);border-top:1px solid var(--border);padding:0 8px;display:flex;align-items:center;height:26px;flex-shrink:0}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes mapPulse{0%{transform:scale(.5);opacity:.7}100%{transform:scale(3);opacity:0}}
        .tgt{display:flex;align-items:center;gap:8px;padding:6px;background:rgba(0,242,255,0.03);margin-bottom:4px;font-size:11px}
        .tgt-dot{width:6px;height:6px;border-radius:50%}
    </style>
</head>
<body>
<div class="scan"></div>
<header class="header">
    <div class="logo"><div class="dot"></div>INTEL-OPS // PRO_V3</div>
    <div class="hdr-r">
        <span id="news-count" style="color:var(--muted)">0 ARTICLES</span>
        <span class="pill" style="background:rgba(0,255,136,0.1);color:var(--green)">● ONLINE</span>
        <span id="clock" style="color:var(--accent)">00:00:00 Z</span>
    </div>
</header>

<div class="dash">
    <div class="col">
        <div class="map-wrap">
            <div id="map"></div>
            <div class="map-lbl">GEO // TACTICAL VIEW</div>
            <div class="map-search">
                <input id="geo-input" type="text" placeholder="🔍 ابحث عن موقع...">
                <button onclick="clearMap()">CLR</button>
            </div>
        </div>
        <div class="col-hdr">📊 STATS <span class="bdg" id="tgt-count">0</span></div>
        <div class="scroll">
            <div id="tgt-list"></div>
        </div>
    </div>

    <div class="col">
        <div class="col-hdr">📡 LIVE OSINT <button onclick="loadNews()" style="background:none;border:none;color:var(--accent);cursor:pointer">↺</button></div>
        <div id="news-list" class="scroll"></div>
        <div class="ticker-wrap"><div id="ticker" style="font-size:11px;white-space:nowrap">INITIALIZING...</div></div>
    </div>

    <div class="col">
        <div class="col-hdr">🧠 COGNITIVE UNIT <span id="a-status" style="font-size:10px">STANDBY</span></div>
        <div id="a-view" class="scroll">
            <div style="text-align:center;padding-top:100px;opacity:.3">🎯 اختر خبراً للبدء</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, markers = [], targetHistory = [];

// === تهيئة الخريطة ===
function initMap() {
    map = L.map('map', { zoomControl:false, attributionControl:false });
    map.setView([30, 40], 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
}

// === جلب الأخبار ===
async function loadNews() {
    const list = document.getElementById('news-list');
    list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
        const res = await fetch('/api/proxy?type=news');
        const data = await res.json();
        window._news = data.articles;
        document.getElementById('news-count').innerText = data.articles.length + ' ARTICLES';
        
        list.innerHTML = data.articles.map((a, i) => `
            <div class="news-item" id="n${i}" onclick="analyze(${i})">
                <div class="news-title">${a.title}</div>
                <div class="news-meta"><span>${a.source?.name || 'RSS'}</span><span>${new Date().toLocaleTimeString()}</span></div>
            </div>
        `).join('');
    } catch(e) { list.innerHTML = 'Error loading news'; }
}

// === تحليل الخبر + تحويل الخريطة ===
async function analyze(idx) {
    const news = window._news[idx];
    const st = document.getElementById('a-status');
    const view = document.getElementById('a-view');
    
    document.querySelectorAll('.news-item').forEach(el => el.classList.remove('active'));
    document.getElementById('n'+idx).classList.add('active');

    st.innerText = 'TARGETING...';
    view.innerHTML = '<div class="loading"><div class="spinner"></div><span>جاري تحديد الموقع والتحليل...</span></div>';

    try {
        const res = await fetch('/api/proxy?type=analyze&text=' + encodeURIComponent(news.title));
        const d = await res.json();
        
        const lat = parseFloat(d.lat);
        const lng = parseFloat(d.lng);

        if (!isNaN(lat) && !isNaN(lng)) {
            // التحول اللحظي للخريطة
            map.flyTo([lat, lng], 7, { animate: true, duration: 1.5 });
            
            // إضافة ماركر جديد
            addMarker(lat, lng, d.threat_level, d.location_name);
            
            // تحديث القائمة
            updateStats(d);
        }

        renderAnalysis(d);
        st.innerText = 'COMPLETE';
    } catch(e) { view.innerHTML = 'Analysis failed'; }
}

function addMarker(lat, lng, level, name) {
    const color = level.includes('حرج') || level.includes('Critical') ? '#ff2d2d' : '#ff8c00';
    const icon = L.divIcon({
        className: '',
        html: `<div style="position:relative;width:20px;height:20px">
                <div style="position:absolute;inset:0;border:1px solid ${color};border-radius:50%;animation:mapPulse 2s infinite"></div>
                <div style="position:absolute;inset:5px;background:${color};border-radius:50%"></div>
               </div>`,
        iconSize: [20, 20]
    });
    const m = L.marker([lat, lng], {icon}).addTo(map).bindPopup(name).openPopup();
    markers.push(m);
}

function updateStats(d) {
    const color = d.threat_level.includes('حرج') ? '#ff2d2d' : '#ff8c00';
    targetHistory.unshift({name: d.location_name, threat: d.threat_level, color});
    if(targetHistory.length > 6) targetHistory.pop();
    
    document.getElementById('tgt-count').innerText = markers.length;
    document.getElementById('tgt-list').innerHTML = targetHistory.map(t => `
        <div class="tgt">
            <div class="tgt-dot" style="background:${t.color}"></div>
            <span style="flex:1">${t.name}</span>
            <span style="color:${t.color}">${t.threat}</span>
        </div>
    `).join('');
}

function renderAnalysis(d) {
    const color = d.threat_level.includes('حرج') ? 'var(--red)' : 'var(--orange)';
    const cls = d.threat_level.includes('حرج') ? 'tc' : 'th';
    
    document.getElementById('a-view').innerHTML = `
        <div class="card">
            <div class="threat-hdr">
                <span class="tbadge ${cls}">${d.threat_level}</span>
                <span style="font-size:11px">${d.location_name}</span>
            </div>
            <div class="score-bar"><div class="score-fill" style="width:${d.threat_score}%;background:${color}"></div></div>
            <div class="sec-lbl" style="margin-top:10px">// ملخص التقرير</div>
            <p class="sec-txt">${d.summary}</p>
            <div class="sec-lbl">// السيناريوهات</div>
            <div class="sc-item sc-cur">الحالي: ${d.scenarios.current}</div>
            <div class="sc-item sc-worst">الأسوأ: ${d.scenarios.worst}</div>
        </div>
    `;
}

function clearMap() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    document.getElementById('tgt-count').innerText = '0';
    document.getElementById('tgt-list').innerHTML = '';
}

// === تشغيل النظام ===
document.addEventListener('DOMContentLoaded', () => {
    initMap();
    loadNews();
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toUTCString().slice(17,25) + ' Z';
    }, 1000);
});
</script>
</body>
</html>
