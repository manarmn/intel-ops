<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INTEL-OPS // PRO_V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #020608; --panel: #070d12; --panel2: #0b1520;
            --accent: #00f2ff; --red: #ff2d2d; --orange: #ff8c00;
            --green: #00ff88; --yellow: #ffe600;
            --text: #c8d8e8; --muted: #3d5166; --border: #112030;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: linear-gradient(rgba(0,242,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .scan-overlay { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px); pointer-events: none; z-index: 9999; }

        /* HEADER */
        .header { height: 48px; background: var(--panel); border-bottom: 1px solid var(--accent); display: flex; align-items: center; padding: 0 16px; justify-content: space-between; position: relative; z-index: 100; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        .header-logo { font-family: 'JetBrains Mono'; color: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; box-shadow: 0 0 8px var(--green); }
        .header-right { display: flex; align-items: center; gap: 16px; font-family: 'JetBrains Mono'; font-size: 12px; }
        .status-pill { padding: 3px 10px; border-radius: 2px; font-size: 11px; font-weight: 700; }

        /* LAYOUT */
        .dashboard { display: grid; grid-template-columns: 320px 1fr 420px; grid-template-rows: 1fr; height: calc(100vh - 48px); position: relative; z-index: 1; }
        .col { border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .col-header { padding: 9px 14px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 11px; color: var(--accent); letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .badge { background: var(--accent); color: #000; padding: 1px 7px; border-radius: 2px; font-size: 10px; font-weight: 700; }
        .scroll { overflow-y: auto; flex: 1; padding: 12px; }
        .scroll::-webkit-scrollbar { width: 3px; }
        .scroll::-webkit-scrollbar-thumb { background: var(--border); }

        /* MAP */
        #map { height: 300px; min-height: 300px; flex-shrink: 0; filter: saturate(0.15) brightness(0.6) hue-rotate(190deg) contrast(1.1); border-bottom: 1px solid var(--border); }
        .map-label { position: absolute; top: 8px; right: 8px; z-index: 1000; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); background: rgba(2,6,8,0.9); padding: 4px 8px; border: 1px solid var(--accent); pointer-events: none; }

        /* STATS */
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: var(--muted); font-size: 11px; }
        .stat-value { font-family: 'JetBrains Mono'; font-size: 12px; }
        .target-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; margin-bottom: 3px; background: var(--panel2); border-radius: 3px; font-size: 11px; border-right: 2px solid transparent; transition: 0.2s; }
        .target-item:hover { border-right-color: var(--accent); }
        .target-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        /* NEWS */
        .news-item { background: var(--panel2); padding: 11px 13px; margin-bottom: 7px; border-radius: 3px; cursor: pointer; border-right: 3px solid transparent; transition: all 0.2s; }
        .news-item:hover { background: #0f1d2a; border-right-color: var(--muted); }
        .news-item.active { background: #0e1e2e; border-right-color: var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.07); }
        .news-title { font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 5px; }
        .news-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono'; }
        .news-source { color: var(--accent); opacity: 0.7; }

        /* ANALYSIS CARD */
        .analysis-card { background: var(--panel2); border: 1px solid var(--border); border-radius: 4px; padding: 16px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .threat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .threat-badge { padding: 4px 14px; border-radius: 2px; font-weight: 700; font-size: 12px; font-family: 'JetBrains Mono'; letter-spacing: 1px; }
        .threat-critical { background: var(--red); color: #fff; box-shadow: 0 0 12px rgba(255,45,45,0.4); }
        .threat-high { background: var(--orange); color: #000; box-shadow: 0 0 10px rgba(255,140,0,0.3); }
        .threat-medium { background: var(--yellow); color: #000; }
        .threat-low { background: var(--green); color: #000; }

        /* THREAT SCORE BAR */
        .score-wrap { margin-bottom: 14px; }
        .score-label { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .score-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

        /* SECTIONS */
        .section { margin-bottom: 13px; }
        .section-label { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 6px; opacity: 0.8; }
        .section-text { font-size: 12px; line-height: 1.7; color: #a0b4c8; }

        /* PARTIES */
        .parties-list { display: flex; flex-wrap: wrap; gap: 5px; }
        .party-tag { background: var(--panel); border: 1px solid var(--border); padding: 3px 10px; border-radius: 2px; font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono'; }

        /* SCENARIOS */
        .scenarios-grid { display: flex; flex-direction: column; gap: 6px; }
        .scenario-item { padding: 8px 12px; border-radius: 3px; font-size: 12px; line-height: 1.5; border-right: 3px solid; }
        .scenario-current { background: rgba(0,132,255,0.08); border-color: var(--accent2, #0084ff); color: #8ab4d4; }
        .scenario-best { background: rgba(0,255,136,0.07); border-color: var(--green); color: #7dd4a8; }
        .scenario-worst { background: rgba(255,45,45,0.07); border-color: var(--red); color: #d4827f; }
        .scenario-label { font-family: 'JetBrains Mono'; font-size: 9px; letter-spacing: 1px; margin-bottom: 3px; opacity: 0.7; }

        /* LOCATION BOX */
        .location-box { display: flex; align-items: center; gap: 10px; background: var(--panel); padding: 8px 12px; border-radius: 3px; border: 1px solid var(--border); }
        .location-name { font-weight: 700; font-size: 13px; }
        .location-coords { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--muted); margin-top: 2px; }

        /* SOURCE TAG */
        .source-tag { font-family: 'JetBrains Mono'; font-size: 9px; padding: 2px 7px; border-radius: 2px; letter-spacing: 1px; }
        .source-groq { background: rgba(0,242,255,0.1); color: var(--accent); border: 1px solid rgba(0,242,255,0.2); }
        .source-gemini { background: rgba(255,140,0,0.1); color: var(--orange); border: 1px solid rgba(255,140,0,0.2); }

        /* LOADING */
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 12px; color: var(--accent); font-family: 'JetBrains Mono'; font-size: 12px; }
        .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.8); } }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 180px; color: var(--muted); font-size: 13px; gap: 8px; text-align: center; }
        .error-msg { background: rgba(255,45,45,0.08); border: 1px solid rgba(255,45,45,0.25); color: var(--red); padding: 10px 14px; border-radius: 3px; font-size: 12px; }
        .refresh-btn { font-family: 'JetBrains Mono'; font-size: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 3px 10px; cursor: pointer; border-radius: 2px; transition: 0.2s; }
        .refresh-btn:hover { background: rgba(0,242,255,0.1); }

        /* TICKER */
        .ticker-wrap { overflow: hidden; background: rgba(0,242,255,0.04); border-top: 1px solid var(--border); padding: 0 8px; display: flex; align-items: center; height: 26px; flex-shrink: 0; font-size: 11px; font-family: 'JetBrains Mono'; color: var(--muted); }
        .ticker-label { color: var(--accent); font-size: 10px; white-space: nowrap; margin-left: 10px; }
        #ticker-text { white-space: nowrap; display: inline-block; }
        
    </style>
</head>
<body>
<div class="scan-overlay"></div>

<header class="header">
    <div class="header-logo"><div class="dot"></div>INTEL-OPS // PRO_V3</div>
    <div class="header-right">
        <span id="news-count" style="color:var(--muted);font-size:11px">تحميل...</span>
        <span class="status-pill" style="background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.25)">● ONLINE</span>
        <span id="clock" style="color:var(--accent)">00:00:00 Z</span>
    </div>
</header>

<div class="dashboard">

    <!-- COL 1: خريطة + إحصائيات -->
    <div class="col">
        <div style="position:relative;flex-shrink:0;height:300px;min-height:300px">
            <div id="map" style="height:300px;width:100%"></div>
            <div class="map-label">GEO // TACTICAL VIEW</div>
            <div style="position:absolute;bottom:8px;left:8px;right:8px;z-index:1000;display:flex;gap:4px">
                <input id="geo-search" type="text" placeholder="🔍 ابحث عن موقع..." 
                    style="flex:1;background:rgba(2,6,8,0.9);border:1px solid var(--muted);color:var(--text);padding:4px 8px;font-family:Cairo,sans-serif;font-size:11px;border-radius:2px;outline:none"
                    oninput="geoSearch(this.value)" />
                <button onclick="clearMapLayers()" style="background:rgba(255,45,45,0.15);border:1px solid var(--red);color:var(--red);padding:4px 8px;font-size:10px;cursor:pointer;border-radius:2px;font-family:JetBrains Mono">CLR</button>
            </div>
        </div>
        <div class="col-header">📊 GEOSPATIAL STATS <span class="badge" id="targets-count">0</span></div>
        <div class="scroll" style="padding:12px">
            <div class="stat-row"><span class="stat-label">أهداف نشطة</span><span class="stat-value" id="stat-targets" style="color:var(--accent)">0</span></div>
            <div class="stat-row"><span class="stat-label">آخر موقع</span><span class="stat-value" id="stat-location" style="font-size:11px">--</span></div>
            <div class="stat-row"><span class="stat-label">مستوى التهديد</span><span class="stat-value" id="stat-threat">--</span></div>
            <div class="stat-row"><span class="stat-label">محرك التحليل</span><span class="stat-value" id="stat-engine" style="color:var(--muted)">--</span></div>
            <div class="stat-row"><span class="stat-label">آخر تحديث</span><span class="stat-value" id="stat-time" style="color:var(--muted);font-size:10px">--</span></div>
            <div id="targets-list" style="margin-top:8px"></div>
        </div>
    </div>

    <!-- COL 2: الأخبار -->
    <div class="col">
        <div class="col-header">
            📡 تغذية OSINT المباشرة
            <button class="refresh-btn" onclick="loadNews()">↺ تحديث</button>
        </div>
        <div id="news-list" class="scroll">
            <div class="loading"><div class="spinner"></div><span>جارٍ فحص الشبكات...</span></div>
        </div>
        <div class="ticker-wrap">
            <span class="ticker-label">LIVE ▶</span>
            <span id="ticker-text">جارٍ تحميل التغذية...</span>
        </div>
    </div>

    <!-- COL 3: التحليل -->
    <div class="col">
        <div class="col-header">
            🧠 وحدة المعالجة المعرفية
            <span id="analysis-status" style="color:var(--muted);font-size:10px">STANDBY</span>
        </div>
        <div id="analysis-view" class="scroll">
            <div class="empty-state"><div style="font-size:28px;opacity:0.3">🎯</div><div>اختر خبراً لبدء التحليل الاستراتيجي</div></div>
        </div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([30, 45], 4);
setTimeout(() => map.invalidateSize(), 200);

// طبقات الخريطة
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
darkLayer.addTo(map);

// بيانات الطبقة الحرارية - مناطق التوتر الدائمة
const baseHeatData = [
    [33.3, 44.4, 0.8],  // العراق
    [31.5, 34.8, 0.9],  // غزة
    [33.5, 36.3, 0.7],  // سوريا
    [32.0, 53.0, 0.7],  // إيران
    [15.3, 44.2, 0.6],  // اليمن
    [33.9, 35.5, 0.5],  // لبنان
    [30.0, 31.2, 0.4],  // مصر
    [24.7, 46.7, 0.4],  // السعودية
    [40.5, 49.9, 0.5],  // أذربيجان
];

let heatLayer = L.heatLayer(baseHeatData, {
    radius: 35, blur: 25, maxZoom: 8,
    gradient: { 0.2: '#00ff88', 0.4: '#ffe600', 0.6: '#ff8c00', 0.8: '#ff2d2d', 1.0: '#ff0055' }
}).addTo(map);

// طبقة حدود الدول من OSM
let countriesLayer = null;
let tensionLines = [];
const markers = [];
const targetHistory = [];
const analysisPoints = []; // لخطوط التوتر

// تحميل حدود الدول
async function loadCountries() {
    try {
        const resp = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
        if (!resp.ok) return;
        const data = await resp.json();
        countriesLayer = L.geoJSON(data, {
            style: { color: 'rgba(0,242,255,0.15)', weight: 1, fillOpacity: 0, dashArray: '3,5' }
        }).addTo(map);
    } catch(e) {}
}
loadCountries();

// ساعة
setInterval(() => { document.getElementById('clock').innerText = new Date().toUTCString().slice(17,25) + ' Z'; }, 1000);
// تحديث تلقائي كل 5 دقائق
setInterval(loadNews, 5 * 60 * 1000);

// ===== جلب الأخبار =====
async function loadNews() {
    const list = document.getElementById('news-list');
    document.getElementById('news-count').innerText = 'جارٍ التحديث...';
    list.innerHTML = `<div class="loading"><div class="spinner"></div><span>جارٍ فحص الشبكات...</span></div>`;
    try {
        const res = await fetch('/api/proxy?type=news');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.articles?.length) throw new Error('لا توجد أخبار');
        document.getElementById('news-count').innerText = `${data.articles.length} خبر`;
        window._newsItems = data.articles;
        list.innerHTML = data.articles.map((art, idx) => {
            const time = new Date(art.publishedAt).toLocaleTimeString('ar-IQ', { hour:'2-digit', minute:'2-digit' });
            const flag = art.source?.flag || '📰';
            const srcName = art.source?.name || 'مجهول';
            return `<div class="news-item" id="news-${idx}" onclick="analyzeNews(${idx})">
                <div class="news-title">${art.title}</div>
                <div class="news-meta">
                    <span class="news-source">${flag} ${srcName}</span>
                    <span style="font-family:JetBrains Mono;font-size:10px;color:var(--muted)">${time}</span>
                </div>
            </div>`;
        }).join('');
        // تحديث التيكر بنظام JS بطيء
        startTicker(data.articles.map(a => a.title).join('   ◆   '));
        document.getElementById('stat-time').innerText = new Date().toLocaleTimeString('ar-IQ');
    } catch(e) {
        list.innerHTML = `<div class="error-msg">⚠️ فشل الاتصال: ${e.message}</div>`;
        document.getElementById('news-count').innerText = 'خطأ';
    }
}

// ===== تحليل الخبر =====
async function analyzeNews(idx) {
    const rawTitle = (window._newsItems?.[idx]?.title || '').replace(/["\\%&+#]/g, ' ').trim();
    const encodedTitle = encodeURIComponent(rawTitle);
    document.querySelectorAll('.news-item').forEach(i => i.classList.remove('active'));
    const el = document.getElementById(`news-${idx}`);
    if (el) el.classList.add('active');

    const view = document.getElementById('analysis-view');
    const statusEl = document.getElementById('analysis-status');
    statusEl.innerText = 'PROCESSING...'; statusEl.style.color = 'var(--yellow)';
    view.innerHTML = `<div class="loading"><div class="spinner"></div><span>تحليل الوضع الاستراتيجي...</span></div>`;

    try {
        const res = await fetch(`/api/proxy?type=analyze&text=${encodedTitle}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();

        const lat = parseFloat(d.lat), lng = parseFloat(d.lng);
        const hasCoords = !isNaN(lat) && !isNaN(lng);
        const threatColor = getThreatColor(d.threat_level);
        const threatClass = getThreatClass(d.threat_level);
        const score = Math.min(100, Math.max(0, parseInt(d.threat_score) || 50));

        // خريطة متكاملة
        if (hasCoords) {
            addTacticalMarker(lat, lng, threatColor, d.location_name, score, d.threat_level);
            highlightCountry(lat, lng, threatColor);
            if (analysisPoints.length > 1) drawTensionLines(threatColor);
            updateHeatLayer(lat, lng, score);
            map.flyTo([lat, lng], 6, { duration: 1.5, easeLinearity: 0.3 });
            updateStats(d, threatColor);
        }

        // السيناريوهات
        const scenariosHTML = d.scenarios ? `
        <div class="section">
            <div class="section-label">// السيناريوهات</div>
            <div class="scenarios-grid">
                <div class="scenario-item scenario-current">
                    <div class="scenario-label">◈ الوضع الراهن</div>
                    ${d.scenarios.current || '--'}
                </div>
                <div class="scenario-item scenario-best">
                    <div class="scenario-label">▲ أفضل سيناريو</div>
                    ${d.scenarios.best || '--'}
                </div>
                <div class="scenario-item scenario-worst">
                    <div class="scenario-label">▼ أسوأ سيناريو</div>
                    ${d.scenarios.worst || '--'}
                </div>
            </div>
        </div>` : '';

        // الأطراف
        const partiesHTML = d.parties?.length ? `
        <div class="section">
            <div class="section-label">// الأطراف المعنية</div>
            <div class="parties-list">${d.parties.map(p => `<span class="party-tag">${p}</span>`).join('')}</div>
        </div>` : '';

        // المصالح
        const interestsHTML = d.interests ? `
        <div class="section">
            <div class="section-label">// المصالح والدوافع</div>
            <p class="section-text">${d.interests}</p>
        </div>` : '';

        // التوقعات
        const forecastHTML = d.forecast ? `
        <div class="section">
            <div class="section-label">// التوقعات (30 يوماً)</div>
            <p class="section-text">${d.forecast}</p>
        </div>` : '';

        view.innerHTML = `
        <div class="analysis-card">
            <div class="threat-header">
                <span class="threat-badge ${threatClass}">${d.threat_level || '--'}</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="source-tag ${d._source === 'groq' ? 'source-groq' : 'source-gemini'}">${d._source?.toUpperCase() || 'AI'}</span>
                    <span style="font-family:JetBrains Mono;font-size:10px;color:var(--muted)">${d.location_name || '--'}</span>
                </div>
            </div>

            <div class="score-wrap">
                <div class="score-label"><span>// مؤشر الخطر</span><span style="color:${threatColor}">${score}/100</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${threatColor}"></div></div>
            </div>

            <div class="section">
                <div class="section-label">// التقرير الاستراتيجي</div>
                <p class="section-text">${d.summary || '--'}</p>
            </div>

            ${partiesHTML}
            ${interestsHTML}
            ${scenariosHTML}
            ${forecastHTML}

            <div class="section">
                <div class="section-label">// الموقع الجغرافي</div>
                <div class="location-box">
                    <span style="font-size:16px">📍</span>
                    <div>
                        <div class="location-name">${d.location_name || 'غير محدد'}</div>
                        <div class="location-coords">${hasCoords ? `${lat.toFixed(3)}° N, ${lng.toFixed(3)}° E` : 'إحداثيات غير متاحة'}</div>
                    </div>
                </div>
            </div>
        </div>`;

        statusEl.innerText = 'COMPLETE'; statusEl.style.color = 'var(--green)';
        setTimeout(() => { statusEl.innerText = 'STANDBY'; statusEl.style.color = 'var(--muted)'; }, 3000);

    } catch(e) {
        view.innerHTML = `<div class="error-msg">⚠️ فشل التحليل: ${e.message}</div>`;
        statusEl.innerText = 'ERROR'; statusEl.style.color = 'var(--red)';
        setTimeout(() => { statusEl.innerText = 'STANDBY'; statusEl.style.color = 'var(--muted)'; }, 3000);
    }
}

// ===== وظائف الخريطة المتكاملة =====

function addTacticalMarker(lat, lng, color, name, score, level) {
    const radius = 8 + (score / 20);

    // النبضة الخارجية المتحركة
    const pulseIcon = L.divIcon({
        className: '',
        html: `<div style="position:relative;width:${radius*4}px;height:${radius*4}px">
            <div style="position:absolute;inset:0;border-radius:50%;background:${color};opacity:0.15;animation:mapPulse 1.5s ease-out infinite"></div>
            <div style="position:absolute;inset:25%;border-radius:50%;background:${color};opacity:0.3;animation:mapPulse 1.5s ease-out infinite 0.3s"></div>
            <div style="position:absolute;inset:38%;border-radius:50%;background:${color};border:2px solid ${color};box-shadow:0 0 12px ${color}"></div>
        </div>`,
        iconSize: [radius*4, radius*4],
        iconAnchor: [radius*2, radius*2]
    });

    const m = L.marker([lat, lng], { icon: pulseIcon }).addTo(map);
    m.bindPopup(`
        <div style="font-family:Cairo,sans-serif;direction:rtl;min-width:160px;background:#070d12;border:1px solid ${color};padding:10px;border-radius:3px">
            <div style="color:${color};font-weight:700;font-size:13px;margin-bottom:6px">📍 ${name}</div>
            <div style="font-family:JetBrains Mono;font-size:10px;color:#3d5166">${lat.toFixed(3)}° N, ${lng.toFixed(3)}° E</div>
            <div style="margin-top:6px;padding:3px 8px;background:${color}22;border:1px solid ${color}44;font-size:11px;color:${color};text-align:center;border-radius:2px">${level}</div>
            <div style="margin-top:5px;background:#0b1520;height:4px;border-radius:2px"><div style="width:${score}%;height:100%;background:${color};border-radius:2px"></div></div>
        </div>`, { className: 'tactical-popup' });

    markers.push(m);
    analysisPoints.push({ lat, lng, color, name, score });
}

function highlightCountry(lat, lng, color) {
    if (!countriesLayer) return;
    const point = L.latLng(lat, lng);
    countriesLayer.eachLayer(layer => {
        try {
            if (layer.getBounds && layer.getBounds().contains(point)) {
                layer.setStyle({ color: color, weight: 2, fillColor: color, fillOpacity: 0.06 });
                setTimeout(() => layer.setStyle({ color: 'rgba(0,242,255,0.15)', weight: 1, fillOpacity: 0 }), 4000);
            }
        } catch(e) {}
    });
}

function drawTensionLines(color) {
    tensionLines.forEach(l => map.removeLayer(l));
    tensionLines = [];
    const pts = analysisPoints.slice(-5);
    for (let i = 0; i < pts.length - 1; i++) {
        const line = L.polyline([[pts[i].lat, pts[i].lng], [pts[i+1].lat, pts[i+1].lng]], {
            color: color, weight: 1, opacity: 0.4, dashArray: '5,8'
        }).addTo(map);
        tensionLines.push(line);
    }
}

function updateHeatLayer(lat, lng, score) {
    const intensity = 0.3 + (score / 150);
    baseHeatData.push([lat, lng, intensity]);
    map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(baseHeatData, {
        radius: 35, blur: 25, maxZoom: 8,
        gradient: { 0.2: '#00ff88', 0.4: '#ffe600', 0.6: '#ff8c00', 0.8: '#ff2d2d', 1.0: '#ff0055' }
    }).addTo(map);
}

function clearMapLayers() {
    markers.forEach(m => map.removeLayer(m));
    tensionLines.forEach(l => map.removeLayer(l));
    markers.length = 0; tensionLines.length = 0; analysisPoints.length = 0;
    baseHeatData.splice(9); // إبقاء البيانات الأساسية
    map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(baseHeatData, {
        radius: 35, blur: 25, maxZoom: 8,
        gradient: { 0.2: '#00ff88', 0.4: '#ffe600', 0.6: '#ff8c00', 0.8: '#ff2d2d', 1.0: '#ff0055' }
    }).addTo(map);
    targetHistory.length = 0;
    document.getElementById('targets-list').innerHTML = '';
    document.getElementById('stat-targets').innerText = '0';
    document.getElementById('targets-count').innerText = '0';
}

// بحث جغرافي تلقائي بـ Nominatim (OpenStreetMap)
let geoSearchTimeout = null;
async function geoSearch(query) {
    if (!query || query.length < 3) return;
    clearTimeout(geoSearchTimeout);
    geoSearchTimeout = setTimeout(async () => {
        try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=3&accept-language=ar`;
            const resp = await fetch(url, { headers: { 'User-Agent': 'INTEL-OPS/3.0' } });
            const results = await resp.json();
            if (results.length > 0) {
                const r = results[0];
                const lat = parseFloat(r.lat), lng = parseFloat(r.lon);
                map.flyTo([lat, lng], 7, { duration: 1.2 });
                L.popup({ className: 'tactical-popup' })
                    .setLatLng([lat, lng])
                    .setContent(`<div style="font-family:Cairo,sans-serif;direction:rtl;color:#00f2ff;background:#070d12;padding:8px;border:1px solid #00f2ff;font-size:12px"><b>${r.display_name.split(',')[0]}</b><br><span style="font-family:JetBrains Mono;font-size:10px;color:#3d5166">${lat.toFixed(3)}°, ${lng.toFixed(3)}°</span></div>`)
                    .openOn(map);
                document.getElementById('geo-search').value = r.display_name.split(',')[0];
            }
        } catch(e) {}
    }, 600);
}

// CSS للنبض
const style = document.createElement('style');
style.textContent = \`
@keyframes mapPulse { 0% { transform:scale(0.5);opacity:0.6; } 100% { transform:scale(2.5);opacity:0; } }
.tactical-popup .leaflet-popup-content-wrapper { background:transparent;border:none;box-shadow:none;padding:0 }
.tactical-popup .leaflet-popup-tip-container { display:none }
\`;
document.head.appendChild(style);

function updateStats(d, threatColor) {
    const count = markers.length;
    document.getElementById('stat-targets').innerText = count;
    document.getElementById('targets-count').innerText = count;
    document.getElementById('stat-location').innerText = d.location_name || '--';
    document.getElementById('stat-threat').innerHTML = `<span style="color:${threatColor};font-weight:700">${d.threat_level || '--'}</span>`;
    document.getElementById('stat-engine').innerHTML = `<span style="color:${d._source === 'groq' ? 'var(--accent)' : 'var(--orange)'}">${d._source?.toUpperCase() || '--'}</span>`;
    document.getElementById('stat-time').innerText = new Date().toLocaleTimeString('ar-IQ');

    targetHistory.unshift({ name: d.location_name || 'غير محدد', threat: d.threat_level || '--', color: threatColor });
    if (targetHistory.length > 6) targetHistory.pop();
    document.getElementById('targets-list').innerHTML = targetHistory.map(t => `
        <div class="target-item">
            <div class="target-dot" style="background:${t.color};box-shadow:0 0 5px ${t.color}"></div>
            <span style="flex:1">${t.name}</span>
            <span style="font-size:10px;color:${t.color};font-family:JetBrains Mono">${t.threat}</span>
        </div>`).join('');
}

function getThreatColor(l) {
    if (!l) return 'var(--muted)';
    if (l.includes('حرج')) return 'var(--red)';
    if (l.includes('مرتفع')) return 'var(--orange)';
    if (l.includes('متوسط')) return 'var(--yellow)';
    return 'var(--green)';
}
function getThreatClass(l) {
    if (!l) return '';
    if (l.includes('حرج')) return 'threat-critical';
    if (l.includes('مرتفع')) return 'threat-high';
    if (l.includes('متوسط')) return 'threat-medium';
    return 'threat-low';
}

// ===== تيكر بطيء جداً =====
let tickerRAF = null;
function startTicker(text) {
    const el = document.getElementById('ticker-text');
    const wrap = el.parentElement;
    el.innerText = text;
    let pos = wrap.offsetWidth;
    if (tickerRAF) cancelAnimationFrame(tickerRAF);
    function step() {
        pos -= 0.4; // سرعة بطيئة جداً
        if (pos < -el.offsetWidth) pos = wrap.offsetWidth;
        el.style.transform = `translateX(${pos}px)`;
        tickerRAF = requestAnimationFrame(step);
    }
    step();
}

window.onload = loadNews;
</script>
