<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEL-OPS PRO | خريطة العمليات الاستخباراتية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg: #050a0f; --panel-bg: #0b1219; --accent: #00f2ff;
            --text: #e0e6ed; --muted: #6b7c93; --red: #ff3e3e;
            --orange: #ff9f1c; --green: #2ec4b6; --border: #1a2634;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; overflow: hidden; height: 100vh; }

        /* Header */
        .header { height: 60px; background: var(--panel-bg); border-bottom: 2px solid var(--accent); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; position: relative; }
        .logo-text { font-family: 'JetBrains Mono', monospace; font-weight: bold; font-size: 1.4rem; color: var(--accent); letter-spacing: 2px; }

        /* Layout */
        .main-layout { display: grid; grid-template-columns: 350px 1fr 350px; height: calc(100vh - 60px); gap: 1px; background: var(--border); }
        .column { background: var(--bg); overflow-y: auto; display: flex; flex-direction: column; border-left: 1px solid var(--border); }

        /* Map Container */
        #map { height: 300px; width: 100%; border-bottom: 1px solid var(--border); filter: grayscale(100%) invert(90%) hue-rotate(180deg); }

        /* News Cards */
        .news-card { padding: 15px; border-bottom: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .news-card:hover { background: rgba(0, 242, 255, 0.05); }
        .news-card.active { border-right: 4px solid var(--accent); background: rgba(0, 242, 255, 0.08); }
        .news-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }

        /* Intel Styling */
        .intel-header { padding: 12px; background: var(--panel-bg); color: var(--accent); font-weight: bold; font-size: 13px; border-bottom: 1px solid var(--border); }
        .scenario-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 5px; margin-top: 10px; border-right: 3px solid var(--accent); font-size: 12px; }

        /* Pulse Animation for Map Marker */
        .pulse-marker { background: var(--red); border-radius: 50%; box-shadow: 0 0 0 rgba(255, 62, 62, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 62, 62, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(255, 62, 62, 0); } }

        .loading-text { text-align: center; padding: 20px; color: var(--accent); font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-text">INTEL-OPS <span style="font-weight:300">GEO-STRAT</span></div>
        <div id="clock" style="font-family:'JetBrains Mono'; color:var(--accent)">00:00:00 Z</div>
    </header>

    <div class="main-layout">
        
        <div class="column">
            <div class="intel-header">🌍 توزيع المسرح العملياتي</div>
            <div id="map"></div>
            <div style="padding: 15px;">
                <div class="intel-header" style="background:transparent; padding:0; margin-bottom:10px;">📊 إحصائيات الرصد</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div style="background:var(--panel-bg); padding:10px; text-align:center; border-radius:5px;">
                        <small style="color:var(--muted)">إصدارات اليوم</small>
                        <div id="count-today" style="font-size:20px; color:var(--accent); font-family:'JetBrains Mono'">0</div>
                    </div>
                    <div style="background:var(--panel-bg); padding:10px; text-align:center; border-radius:5px;">
                        <small style="color:var(--muted)">مناطق النشاط</small>
                        <div id="count-regions" style="font-size:20px; color:var(--orange); font-family:'JetBrains Mono'">5</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="column">
            <div class="intel-header">📡 موجز الاستخبارات المفتوحة</div>
            <div id="news-feed">
                <div class="loading-text">SCANNING GLOBAL NETWORKS...</div>
            </div>
        </div>

        <div class="column">
            <div class="intel-header">🧠 التحليل الاستنباطي (AI)</div>
            <div id="analysis-output" style="padding:20px;">
                <div style="color:var(--muted); text-align:center; margin-top:50px;">
                    يرجى اختيار إحداثية أو خبر للتحليل المعمق
                </div>
            </div>
        </div>

    </div>

    <script>
        let map, markers = [];
        const PROXY = '/api/proxy';

        // إحداثيات افتراضية للمناطق الساخنة
        const locations = {
            "إيران": [32.4279, 53.6880],
            "إسرائيل": [31.0461, 34.8516],
            "غزة": [31.3547, 34.3088],
            "لبنان": [33.8547, 35.8623],
            "العراق": [33.3152, 44.3661],
            "اليمن": [15.5527, 48.5164]
        };

        // تهيئة الخريطة
        function initMap() {
            map = L.map('map').setView([30, 45], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // تحديث الساعة
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB') + " Z";
        }, 1000);

        async function fetchNews() {
            try {
                const res = await fetch(`${PROXY}?type=news`);
                const data = await res.json();
                if (data.articles) {
                    renderNews(data.articles);
                    updateMapMarkers(data.articles);
                }
            } catch (e) { console.error("Error fetching news"); }
        }

        function renderNews(articles) {
            const feed = document.getElementById('news-feed');
            document.getElementById('count-today').innerText = articles.length;
            feed.innerHTML = articles.map((art, i) => `
                <div class="news-card" onclick="analyzeArticle('${encodeURIComponent(art.title)}', '${encodeURIComponent(art.description)}', this)">
                    <div class="news-title">${art.title}</div>
                    <div style="font-size:11px; color:var(--muted)">${art.source.name} • ${new Date(art.publishedAt).toLocaleTimeString('ar-EG')}</div>
                </div>
            `).join('');
        }

        function updateMapMarkers(articles) {
            markers.forEach(m => map.removeLayer(m));
            Object.keys(locations).forEach(city => {
                // إذا وجد اسم الدولة في العناوين، نضع علامة نبض حمراء
                const hasNews = articles.some(a => a.title.includes(city));
                if (hasNews) {
                    const m = L.circleMarker(locations[city], {
                        radius: 8, className: 'pulse-marker', color: '#ff3e3e', fillOpacity: 1
                    }).addTo(map).bindPopup(`منطقة نشطة: ${city}`);
                    markers.push(m);
                }
            });
        }

        async function analyzeArticle(title, desc, el) {
            document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            const output = document.getElementById('analysis-output');
            output.innerHTML = `<div class="loading-text">جاري تشغيل محرك Gemini...</div>`;

            try {
                const res = await fetch(`${PROXY}?type=analyze&text=${title} ${desc}`);
                const data = await res.json();
                
                output.innerHTML = `
                    <div style="background:var(--panel-bg); padding:15px; border-radius:5px; border:1px solid var(--accent)">
                        <div style="color:var(--accent); font-weight:bold; margin-bottom:10px">تقرير OSINT حرج</div>
                        <div style="font-size:13px; margin-bottom:10px">${data.intel_summary}</div>
                        <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:12px">
                            <span>التهديد: <b style="color:var(--red)">${data.threat_level}</b></span>
                            <span>المصداقية: <b>${data.credibility}%</b></span>
                        </div>
                    </div>
                    <div class="scenario-box">
                        <b style="color:var(--green)">السيناريو المرجح:</b><br>${data.scenarios[2] || data.scenarios.likely}
                    </div>
                    <div class="scenario-box" style="border-right-color:var(--orange)">
                        <b style="color:var(--orange)">خطوات التحقق الميداني:</b><br>${data.osint_check}
                    </div>
                `;
            } catch(e) { output.innerHTML = "خطأ في التحليل"; }
        }

        window.onload = () => { initMap(); fetchNews(); };
    </script>
</body>
</html>
