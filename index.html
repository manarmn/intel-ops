<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INTEL-OPS PRO | مركز العمليات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #050a0f; --accent: #00f2ff; --text: #e0e6ed; --panel: #0b1219; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--panel); padding: 15px; border-bottom: 2px solid var(--accent); font-weight: bold; }
        .main { display: grid; grid-template-columns: 350px 1fr 350px; flex: 1; overflow: hidden; }
        .col { border: 1px solid #1a2634; overflow-y: auto; padding: 15px; }
        #map { height: 300px; width: 100%; filter: invert(90%) hue-rotate(180deg); margin-bottom: 15px; }
        .card { background: #0e171f; padding: 10px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; border: 1px solid transparent; }
        .card:hover { border-color: var(--accent); }
        .loading { color: var(--accent); text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">SYSTEM::INTEL-OPS_V3 [LIVE FEED]</div>

    <div class="main">
        <div class="col">
            <div id="map"></div>
            <h3>إحصائيات الرصد</h3>
            <div id="stats" style="color: var(--accent)">جاري جلب البيانات...</div>
        </div>

        <div class="col">
            <h3>📡 موجز الأخبار</h3>
            <div id="news-feed">جاري التحميل...</div>
        </div>

        <div class="col" style="background: var(--panel)">
            <h3>🧠 تحليل الذكاء الاصطناعي</h3>
            <div id="analysis">اختر خبراً لبدء التحليل...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([30, 45], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function getNews() {
            try {
                const res = await fetch('/api/proxy?type=news');
                const data = await res.json();
                const feed = document.getElementById('news-feed');
                feed.innerHTML = data.articles.map(art => `
                    <div class="card" onclick="analyze('${encodeURIComponent(art.title)}')">
                        <div style="font-weight:bold">${art.title}</div>
                        <small>${art.source.name}</small>
                    </div>
                `).join('');
                document.getElementById('stats').innerText = `تم رصد ${data.articles.length} أحداث اليوم`;
            } catch (e) { document.getElementById('news-feed').innerText = "خطأ في الاتصال"; }
        }

        async function analyze(title) {
            const out = document.getElementById('analysis');
            out.innerHTML = '<div class="loading">جاري معالجة البيانات...</div>';
            try {
                const res = await fetch(`/api/proxy?type=analyze&text=${title}`);
                const data = await res.json();
                out.innerHTML = `
                    <div style="border: 1px solid var(--accent); padding: 10px;">
                        <b style="color:red">التهديد: ${data.threat_level}</b>
                        <p>${data.intel_summary}</p>
                        <ul>${data.scenarios.map(s => `<li>${s}</li>`).join('')}</ul>
                    </div>
                `;
            } catch (e) { out.innerHTML = "فشل في التحليل"; }
        }

        window.onload = getNews;
    </script>
</body>
</html>
