<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INTEL-OPS PRO | مجمع الاستخبارات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #050a0f; --accent: #00f2ff; --text: #e0e6ed; --panel: #0b1219; --red: #ff3e3e; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--panel); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; }
        .main { display: grid; grid-template-columns: 380px 1fr 380px; flex: 1; overflow: hidden; }
        .col { border-left: 1px solid #1a2634; overflow-y: auto; padding: 15px; }
        #map { height: 350px; width: 100%; filter: grayscale(1) invert(0.9) hue-rotate(170deg); }
        .card { background: #0e171f; padding: 15px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; border-right: 3px solid transparent; }
        .card:hover, .card.active { background: #1a2a38; border-right-color: var(--accent); }
        .threat-badge { padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: bold; background: var(--red); color: #000; }
        .loading { color: var(--accent); text-align: center; padding: 20px; font-family: monospace; }
    </style>
</head>
<body>

    <header class="header">
        <div style="color: var(--accent); font-weight: bold;">INTEL-OPS // PRO_V3</div>
        <div id="clock" style="font-family: monospace;">00:00:00 Z</div>
    </header>

    <div class="main">
        <div class="col">
            <div id="map"></div>
            <h4 style="color: var(--accent)">GEOSPATIAL STATS</h4>
            <div id="stats">جاري رصد الترددات...</div>
        </div>

        <div class="col">
            <h4>📡 تغذية OSINT المباشرة</h4>
            <div id="news-feed"><div class="loading">SCANNING...</div></div>
        </div>

        <div class="col" style="background: var(--panel)">
            <h4 style="color: var(--accent)">🧠 وحدة المعالجة (GEMINI)</h4>
            <div id="analysis-output">
                <p style="color: #6b7c93; text-align: center; margin-top: 50px;">اختر هدفاً للتحليل</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', {zoomControl: false}).setView([30, 45], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        setInterval(() => { document.getElementById('clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + " Z"; }, 1000);

        async function fetchNews() {
            try {
                const res = await fetch('/api/proxy?type=news');
                const data = await res.json();
                document.getElementById('news-feed').innerHTML = data.articles.map(art => `
                    <div class="card" onclick="analyze('${encodeURIComponent(art.title)}', this)">
                        <div style="font-weight:bold; font-size:13px">${art.title}</div>
                        <div style="font-size:11px; color:#6b7c93; margin-top:5px">${art.source.name}</div>
                    </div>
                `).join('');
                document.getElementById('stats').innerText = `تم رصد ${data.articles.length} أهداف نشطة.`;
            } catch (e) { console.error("News Error"); }
        }

        async function analyze(title, el) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const out = document.getElementById('analysis-output');
            out.innerHTML = '<div class="loading">PROCESSING...</div>';

            try {
                const res = await fetch(`/api/proxy?type=analyze&text=${title}`);
                const data = await res.json();
                out.innerHTML = `
                    <div class="threat-badge">تهديد: ${data.threat_level}</div>
                    <p style="margin-top:15px; font-size:14px">${data.intel_summary}</p>
                    <div style="margin-top:10px; border-top:1px solid #1a2634; padding-top:10px">
                        <small style="color:var(--accent)">السيناريوهات:</small>
                        <ul style="font-size:12px">${data.scenarios.map(s => `<li>${s}</li>`).join('')}</ul>
                    </div>
                `;
            } catch (e) {
                out.innerHTML = `<div style="color:var(--red)">⚠️ فشل في المعالجة. حاول مرة أخرى.</div>`;
            }
        }

        window.onload = fetchNews;
    </script>
</body>
</html>
