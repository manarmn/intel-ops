<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INTEL-OPS // PRO_V3.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg:#020608; --panel:#070d12; --panel2:#0b1520;
            --accent:#00f2ff; --red:#ff2d2d; --orange:#ff8c00;
            --green:#00ff88; --yellow:#ffe600;
            --text:#c8d8e8; --muted:#3d5166; --border:#112030;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Scanline Effect */
        .scan { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,242,255,0.02) 2px, rgba(0,242,255,0.02) 4px); pointer-events: none; z-index: 9999; }
        
        header { height: 48px; background: var(--panel); border-bottom: 1px solid var(--accent); display: flex; align-items: center; padding: 0 16px; justify-content: space-between; z-index: 100; box-shadow: 0 0 15px rgba(0,242,255,0.1); }
        .logo { font-family: 'JetBrains Mono'; color: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: blink 1.5s infinite; }

        .dash { display: grid; grid-template-columns: 320px 1fr 420px; height: calc(100vh - 48px); }
        .col { border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: rgba(2,6,8,0.5); }
        .col-hdr { padding: 10px 14px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 11px; color: var(--accent); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

        /* Map Section */
        #map { height: 300px; width: 100%; border-bottom: 2px solid var(--accent); filter: saturate(0.8) contrast(1.1) brightness(0.8); }
        
        .scroll { overflow-y: auto; flex: 1; padding: 12px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .scroll::-webkit-scrollbar { width: 4px; }
        .scroll::-webkit-scrollbar-thumb { background: var(--border); }

        /* News Items */
        .news-item { background: var(--panel2); padding: 12px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; border-right: 4px solid transparent; transition: 0.3s; }
        .news-item:hover { background: #0e1e2e; }
        .news-item.active { border-right-color: var(--accent); background: #0e1e2e; box-shadow: 0 0 15px rgba(0,242,255,0.05); }
        .news-title { font-size: 13px; font-weight: 600; line-height: 1.5; color: #fff; }
        .news-meta { font-size: 10px; color: var(--muted); margin-top: 6px; font-family: 'JetBrains Mono'; }

        /* Analysis Card */
        .card { background: var(--panel2); border: 1px solid var(--border); padding: 16px; border-radius: 4px; animation: slideIn 0.4s ease-out; }
        .threat-tag { padding: 4px 12px; border-radius: 2px; font-size: 11px; font-weight: 900; font-family: 'JetBrains Mono'; }
        .critical { background: var(--red); color: #fff; }
        .high { background: var(--orange); color: #000; }
        .med { background: var(--yellow); color: #000; }

        .meter { height: 6px; background: #112030; border-radius: 3px; margin: 12px 0; overflow: hidden; }
        .meter-fill { height: 100%; transition: width 1s ease-in-out; }

        .sec-title { font-size: 10px; color: var(--accent); font-family: 'JetBrains Mono'; margin: 15px 0 5px; opacity: 0.7; }
        .sec-content { font-size: 12px; line-height: 1.7; color: #a0b4c8; }

        /* Scenarios */
        .sc-box { margin-top: 10px; display: grid; gap: 8px; }
        .sc-item { padding: 8px 12px; font-size: 11px; border-radius: 3px; border-right: 3px solid; }
        .sc-current { background: rgba(0,242,255,0.05); border-color: var(--accent); }
        .sc-worst { background: rgba(255,45,45,0.05); border-color: var(--red); }

        .loc-footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .coord-val { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); }

        /* Stats */
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
        .stat-label { color: var(--muted); }

        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>
    <div class="scan"></div>
    <header>
        <div class="logo"><div class="dot"></div>INTEL-OPS // STRAT-COMM V3.5</div>
        <div id="clock" style="font-family: 'JetBrains Mono'; color: var(--accent); font-size: 13px;">00:00:00 Z</div>
    </header>

    <div class="dash">
        <div class="col">
            <div id="map"></div>
            <div class="col-hdr">📍 GEOSPATIAL INTELLIGENCE</div>
            <div class="scroll">
                <div class="stat-row"><span class="stat-label">آخر إحداثي مرصود:</span><span id="stat-coords" class="coord-val">--</span></div>
                <div class="stat-row"><span class="stat-label">منطقة العمليات:</span><span id="stat-loc" style="color:var(--accent)">--</span></div>
                <div class="stat-row"><span class="stat-label">مستوى التهديد:</span><span id="stat-threat">--</span></div>
                <div id="history-list" style="margin-top:15px;"></div>
            </div>
        </div>

        <div class="col">
            <div class="col-hdr">📡 OSINT LIVE FEED <button onclick="fetchNews()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-family:'JetBrains Mono'; font-size:10px;">[REFRESH]</button></div>
            <div id="news-list" class="scroll">
                <div style="text-align:center; padding-top:50px; color:var(--muted);">Initializing neural links...</div>
            </div>
        </div>

        <div class="col">
            <div class="col-hdr">🧠 COGNITIVE ANALYSIS UNIT <span id="analyser-status" style="font-size:9px; color:var(--muted);">IDLE</span></div>
            <div id="analysis-view" class="scroll">
                <div style="text-align:center; padding-top:100px; opacity:0.3;">
                    <span style="font-size:40px;">🎯</span><br>حدد هدفاً من التغذية الإخبارية لبدء التحليل الجيوسياسي
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, mainMarker;

        // 1. Initialize System
        function initSystem() {
            // Map Setup (Tactical Satellite View)
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([33.315, 44.366], 5);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.4 }).addTo(map);

            // Clock
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toUTCString().slice(17, 25) + ' Z';
            }, 1000);

            fetchNews();
        }

        // 2. Fetch News
        async function fetchNews() {
            const container = document.getElementById('news-list');
            container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="dot" style="margin:auto;"></div></div>';
            
            try {
                const response = await fetch('/api/proxy?type=news');
                const data = await response.json();
                window._newsCache = data.articles;
                
                container.innerHTML = data.articles.map((art, idx) => `
                    <div class="news-item" id="news-${idx}" onclick="runAnalysis(${idx})">
                        <div class="news-title">${art.title}</div>
                        <div class="news-meta">SOURCE: ${art.source.name} // TIME: ${new Date(art.publishedAt).toLocaleTimeString('en-GB')}</div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = '<div style="color:var(--red); padding:20px;">FAILED TO ESTABLISH LINK.</div>';
            }
        }

        // 3. Strategic Analysis Engine
        async function runAnalysis(index) {
            const article = window._newsCache[index];
            const view = document.getElementById('analysis-view');
            const status = document.getElementById('analyser-status');

            // UI Feedback
            document.querySelectorAll('.news-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`news-${index}`).classList.add('active');
            status.innerText = 'PROCESSING...';
            status.style.color = 'var(--yellow)';
            view.innerHTML = '<div style="text-align:center; padding-top:50px;"><div class="dot" style="background:var(--accent); margin:auto;"></div><p style="margin-top:10px; font-size:12px;">تحليل البيانات المكانية والسياسية...</p></div>';

            try {
                const response = await fetch('/api/proxy?type=analyze&text=' + encodeURIComponent(article.title));
                const intel = await response.json();
                
                updateMapAndStats(intel);
                renderAnalysisUI(intel, view);
                
                status.innerText = 'LOCKED';
                status.style.color = 'var(--green)';
            } catch (err) {
                view.innerHTML = '<div style="color:var(--red); padding:20px;">ANALYSIS ERROR: CONNECTION TIMEOUT.</div>';
                status.innerText = 'ERROR';
            }
        }

        // 4. Update Geospatial Layer
        function updateMapAndStats(intel) {
            const lat = parseFloat(intel.lat);
            const lng = parseFloat(intel.lng);

            if (!isNaN(lat) && !isNaN(lng)) {
                // Move Camera
                map.flyTo([lat, lng], 8, { animate: true, duration: 2 });

                // Update Marker
                if (mainMarker) map.removeLayer(mainMarker);
                
                const tacticalIcon = L.divIcon({
                    className: '',
                    html: `<div style="position:relative; width:30px; height:30px;">
                            <div style="position:absolute; inset:0; border:2px solid ${getThreatColor(intel.threat_level)}; border-radius:50%; animation: pulse 2s infinite;"></div>
                            <div style="position:absolute; inset:10px; background:${getThreatColor(intel.threat_level)}; border-radius:50%; box-shadow: 0 0 10px ${getThreatColor(intel.threat_level)};"></div>
                           </div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });

                mainMarker = L.marker([lat, lng], { icon: tacticalIcon }).addTo(map)
                    .bindPopup(`<div style="background:var(--panel); color:#fff; border:1px solid var(--accent); padding:5px; font-family:Cairo;">${intel.location_name}</div>`);

                // Update Stats Panel
                document.getElementById('stat-coords').innerText = `${lat.toFixed(4)}N, ${lng.toFixed(4)}E`;
                document.getElementById('stat-loc').innerText = intel.location_name;
                document.getElementById('stat-threat').innerText = intel.threat_level;
                document.getElementById('stat-threat').style.color = getThreatColor(intel.threat_level);
            }
        }

        // 5. Render Analysis UI
        function renderAnalysisUI(intel, container) {
            const color = getThreatColor(intel.threat_level);
            const badgeClass = intel.threat_level.includes('حرج') ? 'critical' : (intel.threat_level.includes('مرتفع') ? 'high' : 'med');

            container.innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="threat-tag ${badgeClass}">${intel.threat_level}</span>
                        <span style="font-family:'JetBrains Mono'; font-size:11px; opacity:0.6;">${intel.location_name}</span>
                    </div>

                    <div class="meter"><div class="meter-fill" style="width:${intel.threat_score}%; background:${color};"></div></div>
                    <div style="text-align:left; font-family:'JetBrains Mono'; font-size:10px; color:${color}; margin-bottom:15px;">RISK_INDEX: ${intel.threat_score}/100</div>

                    <div class="sec-title">// التقرير الاستراتيجي</div>
                    <p class="sec-content">${intel.summary || 'لا يوجد ملخص متاح'}</p>

                    <div class="sec-title">// الأطراف الفاعلة</div>
                    <div style="display:flex; gap:5px; flex-wrap:wrap;">
                        ${(intel.parties || []).map(p => `<span style="font-size:10px; background:var(--panel); padding:2px 8px; border:1px solid var(--border);">${p}</span>`).join('')}
                    </div>

                    <div class="sec-title">// سيناريوهات الاستشراف</div>
                    <div class="sc-box">
                        <div class="sc-item sc-current"><strong>الوضع الراهن:</strong> ${intel.scenarios.current}</div>
                        <div class="sc-item sc-worst"><strong>المنحى التصعيدي:</strong> ${intel.scenarios.worst}</div>
                    </div>

                    <div class="loc-footer">
                        <span style="font-size:20px;">📡</span>
                        <div>
                            <div style="font-weight:bold; font-size:12px;">منطقة العمليات المحتملة</div>
                            <div class="coord-val">${intel.lat} °N , ${intel.lng} °E</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getThreatColor(level) {
            if (level.includes('حرج')) return 'var(--red)';
            if (level.includes('مرتفع')) return 'var(--orange)';
            if (level.includes('متوسط')) return 'var(--yellow)';
            return 'var(--green)';
        }

        window.onload = initSystem;
    </script>
</body>
</html>
