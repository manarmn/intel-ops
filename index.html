<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INTEL-OPS // PRO_V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg:#020608;--panel:#070d12;--panel2:#0b1520;
            --accent:#00f2ff;--red:#ff2d2d;--orange:#ff8c00;
            --green:#00ff88;--yellow:#ffe600;
            --text:#c8d8e8;--muted:#3d5166;--border:#112030;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;height:100vh;overflow:hidden}
        .scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
        .header{height:48px;background:var(--panel);border-bottom:1px solid var(--accent);display:flex;align-items:center;padding:0 16px;justify-content:space-between;position:relative;z-index:100}
        .logo{font-family:'JetBrains Mono';color:var(--accent);font-weight:700;font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:10px}
        .dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite}
        .dash{display:grid;grid-template-columns:320px 1fr 420px;height:calc(100vh - 48px);position:relative;z-index:1}
        .col{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
        .col-hdr{padding:9px 14px;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border);font-family:'JetBrains Mono';font-size:11px;color:var(--accent);display:flex;align-items:center;justify-content:space-between}
        .scroll{overflow-y:auto;flex:1;padding:12px}
        #map{height:280px;width:100%;border-bottom:2px solid var(--accent);filter:saturate(0.9) brightness(0.9)}
        .news-item{background:var(--panel2);padding:11px;margin-bottom:7px;border-radius:3px;cursor:pointer;border-right:3px solid transparent;transition:0.2s}
        .news-item.active{background:#0e1e2e;border-right-color:var(--accent)}
        .news-title{font-size:13px;font-weight:600;line-height:1.5}
        .card{background:var(--panel2);border:1px solid var(--border);padding:16px;border-radius:4px}
        .tbadge{padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;font-family:'JetBrains Mono'}
        .tc{background:var(--red);color:#fff} .th{background:var(--orange);color:#000}
        .score-bar{height:6px;background:var(--border);margin:10px 0;border-radius:3px;overflow:hidden}
        .score-fill{height:100%;transition:width 1s}
        .sec-lbl{font-size:10px;color:var(--accent);font-family:'JetBrains Mono';margin-bottom:5px;display:block}
        .sec-txt{font-size:12px;color:#a0b4c8;line-height:1.6;margin-bottom:10px}
        .loc-box{background:var(--panel);padding:8px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;margin-top:10px}
        .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes blink{50%{opacity:0.3}}
        @keyframes mapPulse{0%{transform:scale(0.5);opacity:1}100%{transform:scale(2.5);opacity:0}}
    </style>
</head>
<body>
<div class="scan"></div>
<header class="header">
    <div class="logo"><div class="dot"></div>INTEL-OPS // PRO_V3</div>
    <div id="clock" style="font-family:'JetBrains Mono';color:var(--accent)">00:00:00 Z</div>
</header>

<div class="dash">
    <div class="col">
        <div id="map"></div>
        <div class="col-hdr">📊 GEOSPATIAL STATS <span id="tgt-count" style="color:var(--accent)">0</span></div>
        <div class="scroll">
            <div id="tgt-list"></div>
        </div>
    </div>

    <div class="col">
        <div class="col-hdr">📡 LIVE OSINT FEED <button onclick="loadNews()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:10px">↺ REFRESH</button></div>
        <div id="news-list" class="scroll"></div>
    </div>

    <div class="col">
        <div class="col-hdr">🧠 ANALYSIS UNIT <span id="a-status" style="font-size:9px">STANDBY</span></div>
        <div id="a-view" class="scroll">
            <div style="text-align:center;padding-top:100px;opacity:0.3">🎯 اختر خبراً لتحليل الموقع</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, currentMarker = null, markers = [];

// تهيئة الخريطة (قمر صناعي تكتيكي)
function initMap() {
    map = L.map('map', { zoomControl: false, attributionControl: false }).setView([33, 44], 4);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.5 }).addTo(map);
}

// جلب الأخبار
async function loadNews() {
    const list = document.getElementById('news-list');
    list.innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner" style="margin:auto"></div></div>';
    try {
        const res = await fetch('/api/proxy?type=news');
        const data = await res.json();
        window._news = data.articles;
        list.innerHTML = data.articles.map((a, i) => `
            <div class="news-item" id="n${i}" onclick="analyze(${i})">
                <div class="news-title">${a.title}</div>
                <div style="font-size:10px;color:var(--muted);margin-top:5px">${a.source?.name || 'INTEL'} | ${new Date().toLocaleTimeString()}</div>
            </div>
        `).join('');
    } catch(e) { list.innerHTML = 'Error loading feed'; }
}

// التحليل وتحديث الموقع (الإصلاح هنا)
async function analyze(idx) {
    const news = window._news[idx];
    const view = document.getElementById('a-view');
    const st = document.getElementById('a-status');
    
    document.querySelectorAll('.news-item').forEach(el => el.classList.remove('active'));
    document.getElementById('n'+idx).classList.add('active');

    st.innerText = 'LOCATING...';
    view.innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner" style="margin:auto"></div><br>جاري تحديد الإحداثيات...</div>';

    try {
        const res = await fetch('/api/proxy?type=analyze&text=' + encodeURIComponent(news.title));
        const d = await res.json();
        
        // --- تحديث الخريطة والموقع ---
        const lat = parseFloat(d.lat);
        const lng = parseFloat(d.lng);

        if (!isNaN(lat) && !isNaN(lng)) {
            // 1. مسح أي علامات سابقة
            if(currentMarker) map.removeLayer(currentMarker);
            
            // 2. الانتقال للموقع الجديد (Zoom: 8 للمدن، 6 للدول)
            map.flyTo([lat, lng], 7, { animate: true, duration: 1.5 });

            // 3. إضافة علامة تكتيكية نابضة
            const color = d.threat_level.includes('حرج') ? '#ff2d2d' : '#ff8c00';
            const icon = L.divIcon({
                className: '',
                html: `<div style="position:relative;width:20px;height:20px">
                        <div style="position:absolute;inset:0;background:${color};border-radius:50%;opacity:0.4;animation:mapPulse 2s infinite"></div>
                        <div style="position:absolute;inset:5px;background:${color};border-radius:50%;box-shadow:0 0 10px ${color}"></div>
                       </div>`,
                iconSize: [20, 20], iconAnchor: [10, 10]
            });

            currentMarker = L.marker([lat, lng], {icon}).addTo(map)
                .bindPopup(`<b>${d.location_name}</b>`).openPopup();

            // 4. تحديث سجل الأهداف في العمود الأول
            updateTargetList(d.location_name, d.threat_level, color, lat, lng);
        }

        renderUI(d, lat, lng);
        st.innerText = 'LOCKED';
    } catch(e) { view.innerHTML = 'Analysis error'; }
}

function updateTargetList(name, threat, color, lat, lng) {
    const list = document.getElementById('tgt-list');
    const entry = document.createElement('div');
    entry.style.cssText = `padding:8px; background:var(--panel2); margin-bottom:5px; border-radius:3px; font-size:11px; border-right:2px solid ${color}`;
    entry.innerHTML = `
        <div style="display:flex; justify-content:space-between">
            <span style="font-weight:bold">${name}</span>
            <span style="color:${color}">${threat}</span>
        </div>
        <div style="font-family:monospace; color:var(--muted); font-size:9px">COORD: ${lat.toFixed(3)}N, ${lng.toFixed(3)}E</div>
    `;
    list.prepend(entry);
    if(list.children.length > 5) list.lastChild.remove();
    document.getElementById('tgt-count').innerText = list.children.length;
}

function renderUI(d, lat, lng) {
    const color = d.threat_level.includes('حرج') ? 'var(--red)' : 'var(--orange)';
    document.getElementById('a-view').innerHTML = `
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span class="tbadge ${d.threat_level.includes('حرج')?'tc':'th'}">${d.threat_level}</span>
                <span style="font-size:11px; font-family:monospace">${d.location_name}</span>
            </div>
            <div class="score-bar"><div class="score-fill" style="width:${d.threat_score}%; background:${color}"></div></div>
            <span class="sec-lbl">// التقرير الاستراتيجي</span>
            <p class="sec-txt">${d.summary}</p>
            <div class="loc-box">
                <span style="font-size:18px">📍</span>
                <div>
                    <div style="font-weight:bold; font-size:13px">${d.location_name}</div>
                    <div style="font-family:monospace; font-size:10px; color:var(--muted)">LAT: ${lat.toFixed(4)} | LNG: ${lng.toFixed(4)}</div>
                </div>
            </div>
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', () => {
    initMap();
    loadNews();
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toUTCString().slice(17,25) + ' Z';
    }, 1000);
});
</script>
</body>
</html>
